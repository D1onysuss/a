{% extends "base.html" %}
{% block content %}
<div class="register-container">
    <h1 class="register-title">Create New Account</h1>
    <p class="register-subtitle">Already Registered? <a href="{{ url_for('web.login') }}">Login</a></p>

    <form class="register-form">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="sample@example.com">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="SamplePassword123">

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" value="2000-01-01">

        <button type="submit" class="signup-btn">Sign Up</button>
    </form>
</div>
{% endblock %}
